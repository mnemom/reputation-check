name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

permissions:
  security-events: write
  contents: read

jobs:
  codeql:
    permissions:
      contents: read
      security-events: write
    uses: mnemom/.github/.github/workflows/security-scan.yml@main
    with:
      languages: "javascript-typescript"
